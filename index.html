<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#14213d">
    <title>CigApp</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">CigApp</p>
          <h1>Stav krabicky</h1>
        </div>
        <div class="topbar-actions">
          <form class="auth-form" id="authForm">
            <input id="usernameInput" name="username" type="text" autocomplete="username" placeholder="meno" minlength="3" maxlength="32">
            <input id="passwordInput" name="password" type="password" autocomplete="current-password" placeholder="heslo" minlength="6" maxlength="72">
            <button type="submit">Prihlasit</button>
          </form>
          <button class="text-button hidden" id="signOutButton" type="button">Odhlasit</button>
          <button class="icon-button" id="exportCsvButton" type="button" title="Export CSV" aria-label="Export CSV">CSV</button>
        </div>
      </header>
      <p class="sync-status" id="syncStatus">Lokalny rezim.</p>

      <main>
        <section class="status-panel">
          <div class="pack-meter" aria-live="polite">
            <div>
              <p class="muted">Aktualne v otvorenej krabicke</p>
              <strong id="currentCount">-</strong>
              <span id="currentCapacity">ziadna krabicka</span>
            </div>
            <div class="ring" id="packRing">
              <span id="packPercent">0%</span>
            </div>
          </div>

          <form class="entry-form" id="stateForm">
            <label for="remainingInput">Zadat aktualny pocet cigariet</label>
            <div class="number-row">
              <input id="remainingInput" name="remaining" type="number" min="0" step="1" inputmode="numeric" placeholder="napr. 14" required>
              <button type="submit">Ulozit stav</button>
            </div>
            <label class="check-row">
              <input id="morningStateInput" name="morningState" type="checkbox">
              <span>Toto je ranny stav - ubytok zapocitat do vcera</span>
            </label>
            <p class="hint" id="saveHint">Cas sa ulozi automaticky.</p>
          </form>
        </section>

        <section class="tools-grid">
          <form class="tool-panel" id="packForm">
            <h2>Nova krabicka</h2>
            <button class="open-pack-toggle" id="openPackToggle" type="button">Otvorit novu krabicku</button>
            <div class="pack-options hidden" id="packOptions">
              <fieldset class="capacity-options">
                <legend>Velkost krabicky</legend>
                <label><input type="radio" name="capacityChoice" value="20">20 ks</label>
                <label><input type="radio" name="capacityChoice" value="30">30 ks</label>
                <label><input type="radio" name="capacityChoice" value="40" checked>40 ks</label>
                <label><input type="radio" name="capacityChoice" value="custom">iny pocet</label>
              </fieldset>
              <input class="hidden" id="capacityInput" name="capacity" type="number" min="1" step="1" inputmode="numeric" value="40" aria-label="Iny pocet cigariet">
              <button type="submit">Otvorit</button>
            </div>
          </form>

          <form class="tool-panel" id="adjustmentForm">
            <h2>Oprava denneho poctu</h2>
            <label for="adjustmentDateInput">Den</label>
            <input id="adjustmentDateInput" name="date" type="date" required>
            <label for="adjustmentAmountInput">Zmena poctu vyfajcenych</label>
            <div class="number-row">
              <input id="adjustmentAmountInput" name="amount" type="number" step="1" inputmode="numeric" placeholder="napr. 2 alebo -1" required>
              <button type="submit">Upravit</button>
            </div>
            <input id="adjustmentNoteInput" name="note" type="text" placeholder="Poznamka">
          </form>

        </section>

        <section class="overview-panel">
          <div class="section-head">
            <h2>Priemer</h2>
            <select id="periodSelect" aria-label="Obdobie">
              <option value="week">Tento tyzden</option>
              <option value="30">Poslednych 30 dni</option>
              <option value="year">Od 1.1.</option>
              <option value="365">Poslednych 365 dni</option>
              <option value="all">Vsetko</option>
            </select>
          </div>

          <div class="stats-grid">
            <div>
              <span>Vyfajcene</span>
              <strong id="totalSmoked">0</strong>
            </div>
            <div>
              <span>Denny priemer</span>
              <strong id="dailyAverage">0</strong>
            </div>
            <div>
              <span>Krabicky</span>
              <strong id="packsUsed">0</strong>
            </div>
          </div>
        </section>

        <section class="calendar-panel">
          <div class="section-head">
            <h2>Kalendar</h2>
            <div class="calendar-actions">
              <button class="text-button" id="prevMonthButton" type="button" aria-label="Predchadzajuci mesiac">&lt;</button>
              <strong id="calendarMonthLabel"></strong>
              <button class="text-button" id="nextMonthButton" type="button" aria-label="Nasledujuci mesiac">&gt;</button>
            </div>
          </div>
          <div class="calendar-weekdays" aria-hidden="true">
            <span>Po</span>
            <span>Ut</span>
            <span>St</span>
            <span>Stv</span>
            <span>Pi</span>
            <span>So</span>
            <span>Ne</span>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
          <div class="day-detail" id="dayDetail"></div>
        </section>

        <section class="history-panel">
          <div class="section-head">
            <h2>Zaznamy</h2>
            <button class="text-button" id="clearDataButton" type="button">Vymazat data</button>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
