<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#14213d">
    <title>CigLog</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">CigLog</p>
          <h1>Stav krabicky</h1>
        </div>
        <button class="icon-button" id="exportCsvButton" type="button" title="Export CSV" aria-label="Export CSV">CSV</button>
      </header>

      <main>
        <section class="status-panel">
          <div class="pack-meter" aria-live="polite">
            <div>
              <p class="muted">Aktualne v otvorenej krabicke</p>
              <strong id="currentCount">-</strong>
              <span id="currentCapacity">ziadna krabicka</span>
            </div>
            <div class="ring" id="packRing">
              <span id="packPercent">0%</span>
            </div>
          </div>

          <form class="entry-form" id="stateForm">
            <label for="remainingInput">Zadat aktualny pocet cigariet</label>
            <div class="number-row">
              <input id="remainingInput" name="remaining" type="number" min="0" step="1" inputmode="numeric" placeholder="napr. 14" required>
              <button type="submit">Ulozit stav</button>
            </div>
            <label class="check-row">
              <input id="morningStateInput" name="morningState" type="checkbox">
              <span>Ranny stav - rozdiel od posledneho stavu patri do vcera</span>
            </label>
            <p class="hint" id="saveHint">Cas sa ulozi automaticky.</p>
          </form>
        </section>

        <section class="tools-grid">
          <form class="tool-panel" id="packForm">
            <h2>Nova krabicka</h2>
            <label for="capacityInput">Velkost krabicky</label>
            <div class="number-row">
              <input id="capacityInput" name="capacity" type="number" min="1" step="1" inputmode="numeric" value="20" required>
              <button type="submit">Otvorit</button>
            </div>
          </form>

          <form class="tool-panel" id="adjustmentForm">
            <h2>Manualna uprava</h2>
            <label for="adjustmentDateInput">Den</label>
            <input id="adjustmentDateInput" name="date" type="date" required>
            <label for="adjustmentAmountInput">Zmena poctu vyfajcenych</label>
            <div class="number-row">
              <input id="adjustmentAmountInput" name="amount" type="number" step="1" inputmode="numeric" placeholder="napr. 2 alebo -1" required>
              <button type="submit">Upravit</button>
            </div>
            <input id="adjustmentNoteInput" name="note" type="text" placeholder="Poznamka">
          </form>

          <form class="tool-panel" id="contextForm">
            <h2>Dnesne okolnosti</h2>
            <div class="tag-grid" id="tagGrid"></div>
            <label for="stressInput">Stres</label>
            <input id="stressInput" name="stress" type="range" min="0" max="5" step="1" value="0">
            <textarea id="noteInput" name="note" rows="3" placeholder="Poznamka k dnesku"></textarea>
            <button type="submit">Ulozit den</button>
          </form>
        </section>

        <section class="overview-panel">
          <div class="section-head">
            <h2>Prehlad</h2>
            <select id="periodSelect" aria-label="Obdobie">
              <option value="today">Dnes</option>
              <option value="7">7 dni</option>
              <option value="30">30 dni</option>
              <option value="month">Tento mesiac</option>
              <option value="all">Vsetko</option>
            </select>
          </div>

          <div class="stats-grid">
            <div>
              <span>Vyfajcene</span>
              <strong id="totalSmoked">0</strong>
            </div>
            <div>
              <span>Denny priemer</span>
              <strong id="dailyAverage">0</strong>
            </div>
            <div>
              <span>Krabicky</span>
              <strong id="packsUsed">0</strong>
            </div>
          </div>

          <div class="bars" id="timeBars"></div>
        </section>

        <section class="history-panel">
          <div class="section-head">
            <h2>Zaznamy</h2>
            <button class="text-button" id="clearDataButton" type="button">Vymazat data</button>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
